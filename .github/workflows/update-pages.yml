name: Update market dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: market-dashboard-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh market data
        run: python work/econ_system/market_watch.py --refresh --print-summary
        env:
          ECON_OUTPUT_DIR: ${{ github.workspace }}/docs

      - name: Keep Pages plain
        run: touch docs/.nojekyll

      - name: Commit refreshed site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No site changes to commit."
          else
            git commit -m "Refresh market dashboard"
            git push
          fi
